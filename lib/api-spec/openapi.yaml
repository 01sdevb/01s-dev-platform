openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 0.1s Dev Script Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: scripts
    description: Script operations
  - name: users
    description: User operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email or username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scripts:
    get:
      operationId: listScripts
      tags: [scripts]
      summary: List all scripts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, popular, trending]
            default: newest
      responses:
        "200":
          description: List of scripts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptListResponse"

    post:
      operationId: createScript
      tags: [scripts]
      summary: Create a new script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScriptBody"
      responses:
        "201":
          description: Script created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scripts/trending:
    get:
      operationId: getTrendingScripts
      tags: [scripts]
      summary: Get trending scripts
      responses:
        "200":
          description: Trending scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"

  /scripts/stats:
    get:
      operationId: getScriptStats
      tags: [scripts]
      summary: Get platform stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /scripts/{id}:
    get:
      operationId: getScript
      tags: [scripts]
      summary: Get a script by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteScript
      tags: [scripts]
      summary: Delete a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scripts/{id}/like:
    post:
      operationId: likeScript
      tags: [scripts]
      summary: Toggle like on a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scripts/{id}/view:
    post:
      operationId: viewScript
      tags: [scripts]
      summary: Register a view on a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: View registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/{username}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user public profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{username}/follow:
    post:
      operationId: followUser
      tags: [users]
      summary: Follow a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Followed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unfollowUser
      tags: [users]
      summary: Unfollow a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unfollowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{username}/followers:
    get:
      operationId: getUserFollowers
      tags: [users]
      summary: List a user's followers
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Followers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUsersResponse"

  /users/{username}/following:
    get:
      operationId: getUserFollowing
      tags: [users]
      summary: List the users a user is following
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Following list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowUsersResponse"

  /users/{username}/likes:
    get:
      operationId: getUserLikedScripts
      tags: [users]
      summary: List scripts a user has liked
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Liked scripts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikedScriptsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        username:
          type: string
          minLength: 3
          maxLength: 20
        password:
          type: string
          minLength: 6
        captchaToken:
          type: string
      required: [email, username, password, captchaToken]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        captchaToken:
          type: string
      required: [email, password, captchaToken]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, email, username, createdAt]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        scriptCount:
          type: integer
        totalLikes:
          type: integer
        followerCount:
          type: integer
        followingCount:
          type: integer
        isFollowedByMe:
          type: boolean
        isMe:
          type: boolean
        createdAt:
          type: string
          format: date-time
        scripts:
          type: array
          items:
            $ref: "#/components/schemas/Script"
      required: [id, username, scriptCount, totalLikes, followerCount, followingCount, isFollowedByMe, isMe, createdAt, scripts]

    FollowResponse:
      type: object
      properties:
        following:
          type: boolean
        followers:
          type: integer
      required: [following, followers]

    FollowUserItem:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        followedAt:
          type: string
          format: date-time
        isFollowedByMe:
          type: boolean
      required: [id, username, followedAt, isFollowedByMe]

    FollowUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/FollowUserItem"
      required: [users]

    LikedScriptsResponse:
      type: object
      properties:
        scripts:
          type: array
          items:
            $ref: "#/components/schemas/Script"
      required: [scripts]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
        message:
          type: string
      required: [user, token, message]

    Script:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        code:
          type: string
        game:
          type: string
        category:
          type: string
        authorId:
          type: integer
        authorUsername:
          type: string
        likes:
          type: integer
        views:
          type: integer
        isVerified:
          type: boolean
        isPremium:
          type: boolean
        isLikedByMe:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, description, code, game, category, authorId, authorUsername, likes, views, isVerified, isPremium, isLikedByMe, createdAt, updatedAt]

    CreateScriptBody:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
        code:
          type: string
        game:
          type: string
        category:
          type: string
      required: [title, description, code, game, category]

    ScriptListResponse:
      type: object
      properties:
        scripts:
          type: array
          items:
            $ref: "#/components/schemas/Script"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [scripts, total, page, totalPages]

    LikeResponse:
      type: object
      properties:
        liked:
          type: boolean
        likes:
          type: integer
      required: [liked, likes]

    PlatformStats:
      type: object
      properties:
        totalScripts:
          type: integer
        totalUsers:
          type: integer
        totalLikes:
          type: integer
        totalViews:
          type: integer
      required: [totalScripts, totalUsers, totalLikes, totalViews]
